
<div class="container">
    <h4>Cart</h4>
    <div class="cart" *ngFor="let cartProduct of cartList">
        <div class="product">
            <div class="product-img">
                <img class="thumbnail" src="{{cartProduct.thumbnail}}">
            </div>

            <div class="product-name">
                <div>{{cartProduct.brand}}</div>
                <div class="title">{{cartProduct.title}}</div>
            </div>

            <div class="product-price">
                <div>
                    $ {{cartProduct.price}}
                </div>
            </div>
        </div>
    </div>
    <div class="total">
        Total Price: 
        <div>
           &nbsp;$ {{total}}
        </div>
    </div>

</div>
